name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install (no torch — fast guard on parsers/metrics/splits)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        # torch-dependent tests skip automatically when torch isn't installed;
        # they already run locally on your Mac. Add ".[ml]" here if you want them in CI.
        run: pytest -q
